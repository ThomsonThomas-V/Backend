{% extends "base.html" %}
{% block content %}
    <h2>⚖️ Weight conversion</h2>
    <div class="card">
        <form method="post" action="{{ url_for('weight') }}">
            <label>Value to convert:
                <input type="number" name="value" step="any" required placeholder="e.g. 3.2">
            </label>

            <label>From:
                <select name="from" required>
                    {% for u in units %}
                        <option value="{{ u }}">{{ u }}</option>
                    {% endfor %}
                </select>
            </label>

            <label>To:
                <select name="to" required>
                    {% for u in units %}
                        <option value="{{ u }}">{{ u }}</option>
                    {% endfor %}
                </select>
            </label>

            <button type="submit">Convert</button>
        </form>

        {% if result is not none %}
            <div class="result">
                Result: {{ result }} {{ request.form['to'] }}
            </div>
        {% endif %}
    </div>
{% endblock %}
